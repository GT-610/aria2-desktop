name: aria2_desktop
description: "Setsuna is a cross-platform Aria2 download manager built with Flutter, providing a user-friendly interface to manage local and remote download instances."

# Private package - not published to pub.dev
publish_to: 'none'

# Version and build number
version: 0.1.0

environment:
  sdk: ^3.10.4

# Dependencies
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core functionality
  url_launcher: ^6.1.11
  
  # State management
  provider: ^6.1.2
  
  # Network requests
  dio: ^5.6.0
  http: ^1.5.0
  port_forwarder: ^1.0.0
  
  # WebSocket connections
  web_socket_channel: ^3.0.3
  
  # Storage
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  
  # File handling
  file_picker: ^10.3.8
  desktop_drop: ^0.6.0
  
  # Process management
  process_run: ^1.2.4
  
  # App information
  package_info_plus: ^9.0.0

  # System tray
  launch_at_startup: ^0.5.1
  local_notifier: ^0.1.6
  tray_manager: ^0.5.2
  window_manager: ^0.5.1

  # Internationalization
  intl: any

  # Local packages
  fl_lib:
    path: packages/fl_lib

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code quality
  flutter_lints: ^6.0.0

# Flutter specific configuration
flutter:
  # Enable Material Icons
  uses-material-design: true

  assets:
    - assets/logo/

  # Enable localization
  generate: true
