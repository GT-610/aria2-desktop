# Setsuna built-in aria2 base config
#
# This file is shipped with the app as a baseline template for the built-in
# aria2 instance. Runtime-specific settings such as ports, secrets, download
# directories, session paths, and log paths are provided via command-line
# arguments and override these defaults when the bundled instance starts.
#
# Reference:
# https://aria2.github.io/manual/en/html/aria2c.html

################ RPC ################
# Enable JSON-RPC/XML-RPC support for the built-in instance.
enable-rpc=true
# Allow app WebView / desktop shell integrations to access RPC responses.
rpc-allow-origin-all=true
# Keep the built-in RPC endpoint local by default.
rpc-listen-all=false


################ File system ################
# Save control files periodically so interrupted downloads can resume.
auto-save-interval=10
# Keep a moderate in-memory cache for routine desktop usage.
disk-cache=64M
# Preallocate files when practical to reduce fragmentation.
file-allocation=falloc
# Skip preallocation for smaller files.
no-file-allocation-limit=64M
# Persist session changes regularly.
save-session-interval=10


################ Task ################
# Exclude seed-only torrents from the active task count.
bt-detach-seed-only=true
# Retry indefinitely for transient failures.
max-tries=0
# Wait a bit before retrying temporary server-side failures.
retry-wait=10
# Network timeouts tuned for desktop interactive use.
connect-timeout=10
timeout=10
# Avoid splitting tiny files too aggressively.
min-split-size=1M
# Prefer compressed HTTP responses when available.
http-accept-gzip=true
# Preserve remote timestamps when servers provide them.
remote-time=true
# Suppress periodic console summaries for the bundled desktop process.
summary-interval=0
# Treat quoted Content-Disposition filenames as UTF-8.
content-disposition-default-utf8=true


################ BT ################
# Enable Local Peer Discovery for LAN peers.
bt-enable-lpd=true
# Continue seeding after a successful integrity check when the task is complete.
bt-hash-check-seed=true
# Set a practical upper bound for peers per torrent.
bt-max-peers=128
# Download head pieces first to improve preview/readiness for media files.
bt-prioritize-piece=head
# Clean up files that were intentionally left unselected.
bt-remove-unselected-file=true
# Do not seed without verifying piece hashes first.
bt-seed-unverified=false
# Tracker connectivity timeouts.
bt-tracker-connect-timeout=10
bt-tracker-timeout=10
# IPv4/IPv6 DHT defaults.
dht-entry-point=dht.transmissionbt.com:6881
dht-entry-point6=dht.transmissionbt.com:6881
enable-dht=true
enable-dht6=true
# Enable Peer Exchange where available.
enable-peer-exchange=true
